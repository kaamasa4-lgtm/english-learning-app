<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI English Coach</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ステータスバッジ -->
  <div class="top-bar">
    <div id="statusBadge" class="status-badge disconnected">
      <span class="status-dot"></span>
      <span id="statusText">サーバー未接続</span>
    </div>
  </div>

  <main class="app-container">
    <header class="app-header">
      <h1>AI English Coach</h1>
      <p class="subtitle">Whisper × Qwen2.5 英語発音・スピーキング解析</p>
    </header>

    <!-- 録音コントロール -->
    <section class="recording-card">
      <button id="recordBtn" class="record-btn" aria-label="録音開始/停止">
        <svg id="micIcon" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
          <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-3v-2.08A7 7 0 0 0 19 11z"/>
        </svg>
        <svg id="stopIcon" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>

      <div id="timer" class="timer-display">00:00</div>
      <p class="instruction">マイクボタンを押して発音を開始・停止してください</p>
    </section>

    <!-- ローダー -->
    <div id="loader" class="loader-container" style="display: none;">
      <div class="spinner"></div>
      <p>音声解析 & AIコーチ思考中...</p>
    </div>

    <!-- 解析結果エリア -->
    <section class="results-card">
      <div class="results-header">
        <h2>解析・フィードバック結果</h2>
        <span id="responseMeta" class="response-meta"></span>
      </div>
      
      <div id="responseContainer" class="response-container">
        <p class="empty-state">録音を完了すると、ここに文字起こしとアドバイスが表示されます。</p>
      </div>
    </section>

    <footer class="app-footer">
      English Learning App © 2026. Powered by WSL2 + Ollama + FastAPI
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
