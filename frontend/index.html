<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI English Pronunciation Coach - Phase 1</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* CSS変数定義 (プレミアム・カラーパレット) */
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0f19, #111827, #1e1b4b);
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --accent-gradient: linear-gradient(135deg, #818cf8, #a78bfa);
      --accent-gradient-active: linear-gradient(135deg, #6366f1, #8b5cf6);
      --danger-color: #ef4444;
      --danger-gradient: linear-gradient(135deg, #f87171, #f43f5e);
      --success-color: #10b981;
      --success-gradient: linear-gradient(135deg, #34d399, #059669);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* アプリのコンテナ */
    .app-container {
      width: 100%;
      max-width: 680px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
      position: relative;
    }

    .app-container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), transparent, rgba(167, 139, 250, 0.2));
      border-radius: 26px;
      z-index: -1;
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(to right, #ffffff, #c7d2fe, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* ステータスバッジ */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }

    .status-badge.connected {
      color: var(--success-color);
      border-color: rgba(16, 185, 129, 0.2);
      background: rgba(16, 185, 129, 0.05);
    }
    
    .status-badge.disconnected {
      color: var(--danger-color);
      border-color: rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-dot.pinging {
      animation: pulse 1.5s infinite;
    }

    /* コントロール・録音セクション */
    .recording-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    /* 録音ボタンのラッパー */
    .btn-record-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 録音ボタン */
    .btn-record {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: none;
      outline: none;
      cursor: pointer;
      background: var(--accent-gradient);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4), var(--shadow-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 10;
    }

    .btn-record:hover {
      transform: scale(1.05);
      background: var(--accent-gradient-active);
    }

    .btn-record:active {
      transform: scale(0.95);
    }

    .btn-record.recording {
      background: var(--danger-gradient);
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
    }

    .btn-record svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
      transition: all 0.3s ease;
    }

    /* 録音中のパルスエフェクト */
    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.4);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transform: scale(1);
      transition: all 0.3s ease;
    }

    .btn-record.recording ~ .pulse-ring {
      animation: pulse-ring-anim 1.8s cubic-bezier(0.24, 0, 0.38, 1) infinite;
    }

    /* タイマーとインジケータ */
    .timer-display {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      opacity: 0.5;
      transition: opacity 0.3s ease, color 0.3s ease;
    }

    .timer-display.active {
      opacity: 1;
      color: var(--danger-color);
    }

    .prompt-text {
      text-align: center;
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 80%;
      line-height: 1.5;
    }

    /* レスポンス・ログセクション */
    .response-section {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1.5rem;
      min-height: 180px;
      display: flex;
      flex-direction: column;
    }

    .response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.75rem;
    }

    .response-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-color);
    }

    .response-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* レスポンスデータ表示 */
    .response-content {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #34d399;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      max-height: 250px;
      flex-grow: 1;
    }

    .response-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-secondary);
      flex-grow: 1;
      gap: 0.5rem;
      height: 120px;
    }

    .response-placeholder svg {
      width: 40px;
      height: 40px;
      opacity: 0.3;
      margin-bottom: 0.5rem;
    }

    /* ローダー */
    .loader {
      display: none;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-color);
      font-size: 0.9rem;
      margin: 1rem 0;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(99, 102, 241, 0.1);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* アニメーション定義 */
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes pulse-ring-anim {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* レスポンス結果を綺麗に見せるカード */
    .result-card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      font-family: inherit;
      color: var(--text-primary);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .result-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .result-value {
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
    }

    .result-value.success {
      color: var(--success-color);
    }

    /* フッター */
    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    footer a {
      color: var(--accent-color);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ステータス表示バッジ -->
  <div id="statusBadge" class="status-badge disconnected">
    <div class="status-dot pinging"></div>
    <span id="statusText">サーバー未接続</span>
  </div>

  <div class="app-container">
    <header>
      <h1>AI English Coach</h1>
      <p class="subtitle">Phase 1: 音声アップロード & CORS疎通確認</p>
    </header>

    <main>
      <div class="recording-section">
        <p class="prompt-text">「録音」ボタンを押して英語で何か話してみてください。終了すると自動的にWSL2サーバーへ送信されます。</p>
        
        <div class="btn-record-wrapper">
          <button id="recordBtn" class="btn-record" aria-label="録音ボタン">
            <!-- マイクアイコン -->
            <svg id="micIcon" viewBox="0 0 24 24">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
              <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <!-- 停止アイコン(最初は非表示) -->
            <svg id="stopIcon" viewBox="0 0 24 24" style="display: none;">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <div class="pulse-ring"></div>
        </div>

        <div id="timer" class="timer-display">00:00</div>
        
        <!-- 送信中インジケータ -->
        <div id="loader" class="loader">
          <div class="spinner"></div>
          <span>音声をWSL2サーバーへ送信中...</span>
        </div>
      </div>

      <!-- 解析結果表示エリア -->
      <div class="response-section">
        <div class="response-header">
          <span class="response-title">サーバーレスポンス</span>
          <span id="responseMeta" class="response-meta">-</span>
        </div>
        <div id="responseContainer" class="response-content">
          <div class="response-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <p>音声データの解析結果や接続ログがここに表示されます。</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <footer>
    English Learning App &copy; 2026. Made with &hearts; in WSL2.
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
